<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplement Log</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ec;
    --card: #fffdf8;
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --amber: #c97a2f;
    --amber-pale: #fde8d0;
    --red: #b5391a;
    --red-pale: #fde8e0;
    --text: #1a1a1a;
    --muted: #8a8078;
    --border: #e4ddd2;
    --shadow: 0 2px 16px rgba(45,106,79,0.08);
    --sidebar-w: 280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    -webkit-font-smoothing: antialiased;
  }
  .sidebar {
    width: var(--sidebar-w); min-height: 100vh;
    background: var(--green); color: white;
    padding: 32px 22px; display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; overflow-y: auto;
  }
  .sidebar h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.35rem; font-weight: 700; margin-bottom: 4px;
  }
  .sidebar .subtitle { font-size: 0.75rem; opacity: 0.55; font-weight: 300; margin-bottom: 28px; line-height: 1.4; }
  .sidebar-stats { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .sidebar-stat { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; text-align: center; }
  .sidebar-stat-value { font-family: 'Libre Baskerville', serif; font-size: 1.8rem; font-weight: 700; line-height: 1; }
  .sidebar-stat-label { font-size: 0.68rem; opacity: 0.6; font-weight: 500; margin-top: 4px; letter-spacing: 0.3px; }
  .sidebar-footer { margin-top: auto; font-size: 0.7rem; opacity: 0.4; text-align: center; padding-top: 20px; }
  .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 36px 48px; min-height: 100vh; }
  .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .main-header-date { font-family: 'Libre Baskerville', serif; font-size: 1.4rem; font-weight: 700; color: var(--green); }
  .main-header-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }

  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .dash-card { background: var(--card); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); border: 1px solid var(--border); animation: slideUp 0.4s ease both; }
  .history-card { grid-column: span 2; }
  @keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .section-title { font-family: 'Libre Baskerville', serif; font-size: 1rem; font-weight: 700; margin-bottom: 14px; color: var(--text); }

  /* Add supplement form */
  .add-form { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-input {
    flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'Inter', sans-serif; font-size: 0.88rem; background: white; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .add-input:focus { border-color: var(--green); }
  .add-input::placeholder { color: var(--muted); }
  .add-btn {
    padding: 10px 18px; border: none; border-radius: 10px; background: var(--green); color: white;
    font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #245a40; }

  /* Supplement list */
  .supp-list { display: flex; flex-direction: column; gap: 10px; }
  .supp-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--border);
    background: white; transition: all 0.2s;
  }
  .supp-item-name { font-weight: 500; font-size: 0.9rem; flex: 1; }
  .supp-actions { display: flex; gap: 6px; align-items: center; }
  .supp-btn {
    padding: 7px 14px; border: none; border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .supp-btn-yes { background: var(--green); color: white; }
  .supp-btn-yes:hover { background: #245a40; }
  .supp-btn-no { background: var(--red-pale); color: var(--red); }
  .supp-btn-no:hover { background: #f5cfc4; }
  .supp-btn-del { background: none; color: var(--muted); padding: 7px 8px; font-size: 0.82rem; }
  .supp-btn-del:hover { color: var(--red); }
  .supp-status {
    padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600;
  }
  .status-taken { background: var(--green-pale); color: var(--green); }
  .status-missed { background: var(--red-pale); color: var(--red); }

  /* Dots */
  .week-dots { display: flex; gap: 6px; flex-wrap: wrap; }
  .dot {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.62rem; font-weight: 600; flex-direction: column; gap: 1px;
    transition: transform 0.2s; cursor: default;
  }
  .dot:hover { transform: scale(1.08); }
  .dot-yes { background: var(--green); color: white; }
  .dot-no { background: var(--red-pale); color: var(--red); }
  .dot-empty { background: var(--border); color: var(--muted); }
  .dot span { font-size: 0.58rem; opacity: 0.75; }

  /* Analysis */
  .analysis-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .analysis-bar-label { font-size: 0.78rem; color: var(--muted); width: 68px; flex-shrink: 0; }
  .analysis-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .analysis-bar-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 1s ease; }
  .analysis-pct { font-size: 0.78rem; font-weight: 600; color: var(--green); width: 36px; text-align: right; }
  .tip-box {
    background: var(--amber-pale); border-radius: 10px; padding: 12px 14px; margin-top: 12px;
    font-size: 0.82rem; line-height: 1.5; color: #7a4010; border-left: 3px solid var(--amber);
  }
  .tip-box strong { display: block; margin-bottom: 3px; color: var(--amber); }

  /* Per-supplement sections */
  .supp-section { margin-bottom: 20px; }
  .supp-section:last-child { margin-bottom: 0; }
  .supp-section-name {
    font-weight: 600; font-size: 0.88rem; color: var(--green);
    margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .supp-section-stats {
    display: flex; gap: 16px; margin-bottom: 10px; font-size: 0.75rem; color: var(--muted);
  }
  .supp-section-stats span { font-weight: 600; color: var(--text); }

  /* History */
  .history-list { list-style: none; max-height: 360px; overflow-y: auto; }
  .history-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem;
  }
  .history-item:last-child { border-bottom: none; }
  .history-date { color: var(--muted); }
  .history-detail { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .badge { padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; }
  .badge-yes { background: var(--green-pale); color: var(--green); }
  .badge-no { background: var(--red-pale); color: var(--red); }

  /* Milestones */
  .ms-timeline { display: flex; flex-direction: column; gap: 10px; }
  .ms-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-radius: 10px; background: rgba(0,0,0,0.02); border: 1px solid var(--border);
  }
  .ms-row.ms-done { background: var(--green-pale); border-color: var(--green-light); }
  .ms-row.ms-next { background: var(--amber-pale); border-color: var(--amber); }
  .ms-row-info { flex: 1; }
  .ms-row-title { font-weight: 600; font-size: 0.82rem; }
  .ms-row-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .ms-row-badge { font-size: 0.66rem; font-weight: 600; padding: 3px 9px; border-radius: 99px; flex-shrink: 0; }
  .ms-row.ms-done .ms-row-badge { background: var(--green); color: white; }
  .ms-row.ms-next .ms-row-badge { background: var(--amber); color: white; }
  .ms-row .ms-row-badge { background: var(--border); color: var(--muted); }

  /* Scrollable cards */
  .scroll-inner { max-height: 420px; overflow-y: auto; }

  .empty-state { text-align: center; padding: 28px 14px; color: var(--muted); font-size: 0.85rem; line-height: 1.6; }

  @media (max-width: 1024px) { .dash-grid { grid-template-columns: 1fr; } }

  @media (max-width: 768px) {
    body { flex-direction: column; }

    /* Sidebar becomes a compact top bar */
    .sidebar {
      position: relative; width: 100%; min-height: auto;
      padding: 16px 16px 12px; flex-direction: column; gap: 0;
    }
    .sidebar h1 { font-size: 1.1rem; margin-bottom: 2px; }
    .sidebar .subtitle { margin-bottom: 12px; font-size: 0.7rem; }
    .sidebar-stats { flex-direction: row; gap: 8px; margin-bottom: 0; }
    .sidebar-stat { flex: 1; padding: 8px 4px; border-radius: 10px; }
    .sidebar-stat-value { font-size: 1.2rem; }
    .sidebar-stat-label { font-size: 0.6rem; }
    .sidebar-footer { display: none; }

    /* Main content full width */
    .main { margin-left: 0; padding: 16px 12px 40px; }
    .main-header { margin-bottom: 16px; }
    .main-header-date { font-size: 1.2rem; }

    /* Single column grid */
    .dash-grid { grid-template-columns: 1fr; gap: 14px; }
    .dash-card { padding: 16px; border-radius: 14px; }
    .history-card { grid-column: span 1; }

    /* Supplement items: stack name above actions on small screens */
    .supp-item { flex-wrap: wrap; gap: 8px; }
    .supp-item-name { width: 100%; font-size: 0.85rem; }
    .supp-actions { width: 100%; justify-content: flex-end; }

    /* Date picker header wraps cleanly */
    .section-title { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; }

    /* Dots smaller on mobile */
    .dot { width: 28px; height: 28px; font-size: 0.55rem; border-radius: 6px; }
    .dot span { font-size: 0.5rem; }

    /* Analysis label narrower */
    .analysis-bar-label { width: 56px; font-size: 0.72rem; }

    /* History badges wrap */
    .history-item { flex-wrap: wrap; gap: 6px; }
    .history-item > div { display: flex; flex-wrap: wrap; gap: 4px; }

    /* Scroll inner no fixed height on mobile */
    .scroll-inner { max-height: none; overflow-y: visible; }
    .history-list { max-height: none; }

    /* Add form stacks on very small screens */
    .add-form { flex-wrap: wrap; }
    .add-input { min-width: 0; }
  }

  @media (max-width: 380px) {
    .sidebar-stats { gap: 4px; }
    .sidebar-stat-value { font-size: 1rem; }
    .supp-btn { padding: 6px 10px; font-size: 0.72rem; }
  }
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <h1>Supplement Log</h1>
  <p class="subtitle">Track your daily supplements</p>
  <div class="sidebar-stats" id="sidebar-stats"></div>
  <div class="sidebar-footer">Stay consistent, every day counts.</div>
</aside>
<div class="main">
  <div class="main-header">
    <div>
      <div class="main-header-label">Today</div>
      <div class="main-header-date" id="header-date"></div>
    </div>
  </div>
  <div id="app"><div style="text-align:center;padding:40px;color:var(--muted);">Loading...</div></div>
</div>
<script>
// Supplement-specific milestone descriptions based on actual benefits (sources: Healthline, Mayo Clinic, Love Life Supplements)
const suppMilestones = {
  'magnesium glycinate': [
    { days: 7,  label: 'Week 1', desc: 'Early calming effects. Subtle improvements in sleep quality and reduced muscle twitches or cramps.' },
    { days: 14, label: 'Week 2', desc: 'Deeper, more restful sleep. Reduced anxiety and muscle tension becoming more noticeable.' },
    { days: 30, label: 'Month 1', desc: 'Steady mood improvements, fewer headaches, and better stress resilience. Muscle recovery noticeably faster.' },
    { days: 60, label: 'Month 2', desc: 'Blood pressure and blood sugar regulation improving. Heart rhythm more stable. Consistent calm energy.' },
    { days: 90, label: 'Month 3 — Full Effect', desc: 'Magnesium stores fully replenished. Optimal nerve function, bone support, and long-term cardiovascular benefits.' },
  ],
  'vitamin code raw one': [
    { days: 7,  label: 'Week 1', desc: 'B vitamins absorbing quickly. Early energy boost and reduced afternoon fatigue.' },
    { days: 14, label: 'Week 2', desc: 'Vitamin C and E building up. Better immune response and early antioxidant protection.' },
    { days: 30, label: 'Month 1', desc: 'Zinc and selenium supporting prostate health. Vitamin D levels rising, improving mood and bone strength.' },
    { days: 60, label: 'Month 2', desc: 'CoQ10 supporting heart health. Stronger immunity, healthier skin from vitamin A, and sustained daily energy.' },
    { days: 90, label: 'Month 3 — Full Effect', desc: 'All nutrient levels optimized. Full-spectrum benefits: energy, immunity, heart health, prostate support, and mental clarity.' },
  ],
  '_default': [
    { days: 7,  label: 'Week 1', desc: 'Initial absorption phase. Early subtle effects may begin as nutrient levels start building.' },
    { days: 14, label: 'Week 2', desc: 'Consistent intake paying off. Noticeable improvements in energy and general wellbeing.' },
    { days: 30, label: 'Month 1', desc: 'Meaningful benefits emerging. Body adapting to sustained nutrient levels.' },
    { days: 60, label: 'Month 2', desc: 'Deeper systemic benefits. Immune function, recovery, and mood noticeably improved.' },
    { days: 90, label: 'Month 3 — Full Effect', desc: 'Optimal levels reached. Full long-term benefits across energy, immunity, and overall health.' },
  ],
};

function getMilestonesFor(name) {
  const lower = name.toLowerCase();
  for (const key in suppMilestones) {
    if (key !== '_default' && lower.includes(key)) return suppMilestones[key];
  }
  return suppMilestones['_default'];
}

let supplements = [], logData = {};
let selectedDate = null; // null means today

// Use local date instead of UTC to avoid timezone off-by-one day issues
function localDateKey(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function todayKey() { return localDateKey(new Date()); }
function formatDate(key) {
  const d = new Date(key + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

// Per-supplement helpers
function suppDaysTaken(sid) {
  const slog = logData[sid] || {};
  return Object.values(slog).filter(v => v === true).length;
}
function suppDaysLogged(sid) {
  return Object.keys(logData[sid] || {}).length;
}
function suppRate(sid) {
  const logged = suppDaysLogged(sid);
  return logged ? Math.round((suppDaysTaken(sid) / logged) * 100) : 0;
}
function suppStreak(sid) {
  let streak = 0; const today = new Date(); const slog = logData[sid] || {};
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const key = localDateKey(d);
    if (slog[key] === true) streak++;
    else if (slog[key] === false) break;
    else if (i > 0) break;
  }
  return streak;
}
function suppWeekPct(sid, offset) {
  let yes = 0, total = 0; const slog = logData[sid] || {};
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - offset - i);
    const key = localDateKey(d);
    if (slog[key] !== undefined) { total++; if (slog[key]) yes++; }
  }
  return total ? Math.round((yes / total) * 100) : -1;
}

// Global helpers
function totalDaysActive() {
  const days = new Set();
  for (const sid in logData) {
    for (const date in logData[sid]) { if (logData[sid][date]) days.add(date); }
  }
  return days.size;
}
function overallRate() {
  let t = 0, y = 0;
  for (const s of supplements) { const slog = logData[s.id] || {}; for (const d in slog) { t++; if (slog[d]) y++; } }
  return t ? Math.round((y / t) * 100) : 0;
}

async function fetchAll() {
  const [sRes, lRes] = await Promise.all([fetch('/api/supplements'), fetch('/api/logs')]);
  supplements = await sRes.json();
  logData = await lRes.json();
}
async function addSupplement() {
  const input = document.getElementById('supp-input');
  const name = input.value.trim();
  if (!name) return;
  const res = await fetch('/api/supplements', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
  if (res.ok) { const s = await res.json(); supplements.push(s); input.value = ''; render(); }
}
async function deleteSupplement(id) {
  await fetch('/api/supplements/' + id, { method: 'DELETE' });
  supplements = supplements.filter(s => s.id !== id);
  delete logData[id];
  render();
}
async function logSupplement(sid, taken) {
  const dateKey = selectedDate || todayKey();
  if (!logData[sid]) logData[sid] = {};
  logData[sid][dateKey] = taken;
  render();
  await fetch('/api/logs', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ supplement_id: sid, date: dateKey, taken }) });
}
function selectDate(val) {
  selectedDate = val || null;
  render();
}

function render() {
  const today = todayKey();
  const rate = overallRate();

  document.getElementById('header-date').textContent = formatDate(today);
  document.getElementById('sidebar-stats').innerHTML = `
    <div class="sidebar-stat"><div class="sidebar-stat-value">${totalDaysActive()}</div><div class="sidebar-stat-label">Days Active</div></div>
    <div class="sidebar-stat"><div class="sidebar-stat-value">${rate}%</div><div class="sidebar-stat-label">Overall Compliance</div></div>
    <div class="sidebar-stat"><div class="sidebar-stat-value">${supplements.length}</div><div class="sidebar-stat-label">Supplements</div></div>`;

  // Today's supplement list
  const activeDate = selectedDate || today;
  const isToday = activeDate === today;
  const dateLabel = isToday ? 'Today' : formatDate(activeDate);

  let suppHTML = '';
  if (supplements.length === 0) {
    suppHTML = '<div class="empty-state">No supplements added yet. Add one above to start tracking.</div>';
  } else {
    suppHTML = '<div class="supp-list">';
    for (const s of supplements) {
      const val = logData[s.id] && logData[s.id][activeDate];
      let actionHTML = '';
      if (val === true) {
        actionHTML = `<span class="supp-status status-taken">Taken</span>`;
      } else if (val === false) {
        actionHTML = `<span class="supp-status status-missed">Missed</span>`;
      } else {
        actionHTML = `<button class="supp-btn supp-btn-yes" onclick="logSupplement(${s.id},true)">Taken</button>
          <button class="supp-btn supp-btn-no" onclick="logSupplement(${s.id},false)">Missed</button>`;
      }
      suppHTML += `<div class="supp-item">
        <span class="supp-item-name">${s.name}</span>
        <div class="supp-actions">${actionHTML}
          <button class="supp-btn supp-btn-del" onclick="deleteSupplement(${s.id})" title="Remove">&times;</button>
        </div></div>`;
    }
    suppHTML += '</div>';
  }

  // Milestones — per supplement
  let msHTML = '';
  if (supplements.length === 0) {
    msHTML = '<div class="empty-state">Add supplements to track milestones.</div>';
  } else {
    msHTML = '<div class="scroll-inner">';
    for (const s of supplements) {
      const days = suppDaysTaken(s.id);
      const streak = suppStreak(s.id);
      const ms = getMilestonesFor(s.name);
      let nextMs = null;
      for (const m of ms) { if (days < m.days) { nextMs = m; break; } }
      msHTML += `<div class="supp-section"><div class="supp-section-name">${s.name}</div>`;
      msHTML += `<div class="supp-section-stats"><span>${days}</span> days taken · <span>${streak}</span> day streak · <span>${suppRate(s.id)}%</span> rate</div>`;
      msHTML += '<div class="ms-timeline">';
      ms.forEach(m => {
        const done = days >= m.days, isNext = !done && nextMs && m.days === nextMs.days;
        const cls = done ? 'ms-done' : isNext ? 'ms-next' : '';
        const badge = done ? 'Reached' : isNext ? `${m.days - days} to go` : `${m.days} days`;
        msHTML += `<div class="ms-row ${cls}"><div class="ms-row-info">
          <div class="ms-row-title">${m.label}</div>
          <div class="ms-row-sub">${m.desc}</div>
          </div><div class="ms-row-badge">${badge}</div></div>`;
      });
      msHTML += '</div></div>';
    }
    msHTML += '</div>';
  }

  // 14-day dots — per supplement
  let dotsHTML = '';
  if (supplements.length === 0) {
    dotsHTML = '<div class="empty-state">Add supplements to see daily tracking.</div>';
  } else {
    dotsHTML = '<div class="scroll-inner">';
    for (const s of supplements) {
      dotsHTML += `<div class="supp-section"><div class="supp-section-name">${s.name}</div><div class="week-dots">`;
      const slog = logData[s.id] || {};
      for (let i = 13; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const key = localDateKey(d);
        const dayName = d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 2);
        const val = slog[key];
        const cls = val === true ? 'dot-yes' : val === false ? 'dot-no' : 'dot-empty';
        const icon = val === true ? '/' : val === false ? 'x' : '-';
        dotsHTML += `<div class="dot ${cls}" title="${s.name} — ${formatDate(key)}">${icon}<span>${dayName}</span></div>`;
      }
      dotsHTML += '</div></div>';
    }
    dotsHTML += '</div>';
  }

  // Weekly analysis — per supplement
  let analysisHTML = '';
  const totalLogged = Object.values(logData).reduce((sum, slog) => sum + Object.keys(slog).length, 0);
  if (totalLogged === 0 || supplements.length === 0) {
    analysisHTML = '<div class="empty-state">Start logging to see your weekly analysis.</div>';
  } else {
    analysisHTML = '<div class="scroll-inner">';
    const weeks = [{label:'This week',offset:0},{label:'Last week',offset:7},{label:'3 wks ago',offset:14},{label:'4 wks ago',offset:21}];
    for (const s of supplements) {
      const sRate = suppRate(s.id);
      analysisHTML += `<div class="supp-section"><div class="supp-section-name">${s.name} — ${sRate}% overall</div>`;
      weeks.forEach(w => {
        const pct = suppWeekPct(s.id, w.offset);
        analysisHTML += `<div class="analysis-bar-row"><div class="analysis-bar-label">${w.label}</div>
          <div class="analysis-bar-track"><div class="analysis-bar-fill" style="width:${pct >= 0 ? pct : 0}%"></div></div>
          <div class="analysis-pct">${pct >= 0 ? pct+'%' : '--'}</div></div>`;
      });
      // Per-supplement tip
      if (sRate >= 90) analysisHTML += `<div class="tip-box"><strong>Great with ${s.name}</strong>At ${sRate}%, you're getting the full benefit from this one.</div>`;
      else if (sRate >= 70) analysisHTML += `<div class="tip-box"><strong>${s.name} is on track</strong>At ${sRate}%, almost there. A bit more consistency and you'll hit full benefit.</div>`;
      else if (sRate >= 1) analysisHTML += `<div class="tip-box"><strong>${s.name} needs attention</strong>At ${sRate}%, the benefits may not be building up consistently. Try pairing it with a daily habit.</div>`;
      analysisHTML += '</div>';
    }
    analysisHTML += '</div>';
  }

  // History
  const allDates = new Set();
  for (const sid in logData) { for (const d in logData[sid]) allDates.add(d); }
  const sortedDates = [...allDates].sort().reverse().slice(0, 25);
  let historyHTML = '';
  if (sortedDates.length === 0) {
    historyHTML = '<div class="empty-state">No entries yet. Log today to get started.</div>';
  } else {
    historyHTML = sortedDates.map(date => {
      const details = supplements.map(s => {
        const val = logData[s.id] && logData[s.id][date];
        if (val === true) return `<span class="badge badge-yes">${s.name}</span>`;
        if (val === false) return `<span class="badge badge-no">${s.name}</span>`;
        return '';
      }).filter(Boolean).join(' ');
      return `<li class="history-item"><span class="history-date">${formatDate(date)}</span><div>${details || '<span style="color:var(--muted);font-size:0.72rem">No data</span>'}</div></li>`;
    }).join('');
  }

  document.getElementById('app').innerHTML = `
    <div class="dash-grid">
      <div class="dash-card" style="animation-delay:0s">
        <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <span>Supplements — ${dateLabel}</span>
          <div style="display:flex;gap:6px;align-items:center">
            <input type="date" value="${activeDate}" max="${today}" onchange="selectDate(this.value)"
              style="font-family:Inter,sans-serif;font-size:0.78rem;padding:5px 8px;border:1.5px solid var(--border);border-radius:8px;background:white;color:var(--text);cursor:pointer">
            ${!isToday ? `<button onclick="selectDate(null)" class="supp-btn" style="background:var(--green);color:white;padding:5px 10px;font-size:0.72rem">Back to today</button>` : ''}
          </div>
        </div>
        <div class="add-form">
          <input class="add-input" id="supp-input" type="text" placeholder="Add a supplement..." onkeydown="if(event.key==='Enter')addSupplement()">
          <button class="add-btn" onclick="addSupplement()">Add</button>
        </div>
        ${suppHTML}
      </div>
      <div class="dash-card" style="animation-delay:0.05s">
        <div class="section-title">Milestones</div>
        ${msHTML}
      </div>
      <div class="dash-card" style="animation-delay:0.1s">
        <div class="section-title">Last 14 Days</div>
        ${dotsHTML}
      </div>
      <div class="dash-card" style="animation-delay:0.15s">
        <div class="section-title">Weekly Analysis</div>
        ${analysisHTML}
      </div>
      <div class="dash-card history-card" style="animation-delay:0.2s">
        <div class="section-title">Log History</div>
        <ul class="history-list">${historyHTML}</ul>
      </div>
    </div>`;
}

async function init() { await fetchAll(); render(); }
init();
</script>
</body>
</html>
